<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fff5f8">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#fff5f8;
  --card:#ffe9ef;
  --accent:#e88aa1;
  --text:#2b2b2b;
  --text2:#7a6f73;
  --radius:18px;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrap{padding:16px 14px 90px}

.hdr{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.htitle{font-size:26px;font-weight:600}

.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:12px;
}

.tabs{display:flex;gap:8px;margin-bottom:12px}
.tab{
  flex:1;
  border:1px solid #f2c7d1;
  background:#fff;
  border-radius:14px;
  padding:8px;
  font-size:14px;
}

.list .row{
  padding:10px 0;
  border-bottom:1px solid #f0d6dd;
}

.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:64px;
  background:#fff;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.ni{
  font-size:11px;
  color:#a78f95;
  text-align:center;
}

.fab{
  position:fixed;
  right:14px;
  bottom:80px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:28px;
  opacity:.88;
}

.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.2);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal{
  background:#fff;
  border-radius:18px;
  padding:16px;
  width:85%;
}

</style>
</head>

<body>

<div class="wrap">

<div class="hdr">
  <div class="htitle">Деньги</div>
  <input type="month" id="month">
</div>

<div class="tabs">
  <button class="tab" onclick="openPartner('all')">все</button>
  <button class="tab" onclick="openPartner('income')">доходы</button>
  <button class="tab" onclick="openPartner('expense')">расходы</button>
</div>

<div class="card list" id="list"></div>

</div>

<div class="fab" onclick="openAdd()">+</div>

<div class="nav">
  <div class="ni">₽<br>деньги</div>
  <div class="ni">▦<br>бюджет</div>
  <div class="ni">≡<br>задачи</div>
  <div class="ni">✈︎<br>поездки</div>
  <div class="ni">♡<br>хочу</div>
</div>

<!-- partner modal -->
<div class="modal-bg" id="partnerModal">
  <div class="modal">
    <div>выберите партнёра</div>
    <button onclick="selectPartner('Евгений')">Евгений</button>
    <button onclick="selectPartner('Аннушка')">Аннушка</button>
  </div>
</div>

<!-- chart modal -->
<div class="modal-bg" id="chartModal">
  <div class="modal">
    <canvas id="chart"></canvas>
    <div id="legend"></div>
  </div>
</div>

<script>

const SHEET_URL = "YOUR_SCRIPT_URL";

let entries = [];
let currentMonthKey = "";
let entrySeq = 0;
let currentType = "expense";

function syncFromSheets(){
  return new Promise((resolve,reject)=>{
    const cb = "cb_"+Date.now();
    let done=false;

    window[cb]=(data)=>{
      if(done)return;
      done=true;
      delete window[cb];
      document.body.removeChild(script);
      processSheetData(data);
      resolve();
    };

    const script=document.createElement("script");
    script.src=SHEET_URL+"?callback="+cb;

    script.onerror=()=>{
      if(done)return;
      done=true;
      reject();
    };

    setTimeout(()=>{
      if(done)return;
      done=true;
      reject();
    },10000);

    document.body.appendChild(script);
  });
}

function processSheetData(data){
  entries = data.entries || [];
  entries.forEach(e=>{
    if(!e.id){
      e.id="loc_"+Date.now()+"_"+(++entrySeq);
    }
  });
  renderEntries();
}

function renderEntries(){
  const el=document.getElementById("list");
  const month = document.getElementById("month").value;

  const filtered = entries.filter(e=>e.date.startsWith(month));

  el.innerHTML = filtered.map(e=>`
    <div class="row">
      ${e.cat} — ${e.amount} ₽
    </div>
  `).join("");
}

function openPartner(type){
  currentType = type;
  document.getElementById("partnerModal").style.display="flex";
}

function selectPartner(name){
  document.getElementById("partnerModal").style.display="none";

  const data = entries.filter(e=>e.who===name && e.type===currentType);

  const cats = {};
  let total=0;

  data.forEach(e=>{
    cats[e.cat]=(cats[e.cat]||0)+e.amount;
    total+=e.amount;
  });

  const labels = Object.keys(cats);
  const values = Object.values(cats);

  const ctx = document.getElementById("chart");
  new Chart(ctx,{
    type:"doughnut",
    data:{labels,datasets:[{data:values}]}
  });

  document.getElementById("legend").innerHTML = labels.map((c,i)=>{
    const p = Math.round(values[i]/total*100);
    return `<div>${c} — ${values[i]} ₽ (${p}%)</div>`;
  }).join("");

  document.getElementById("chartModal").style.display="flex";
}

function openAdd(){
  const item = {
    id:"loc_"+Date.now()+"_"+(++entrySeq),
    type:"expense",
    date:new Date().toISOString().slice(0,10),
    cat:"прочее",
    amount:100,
    who:"Евгений"
  };

  entries.push(item);

  fetch(SHEET_URL,{
    method:"POST",
    body:JSON.stringify(item)
  });

  renderEntries();
}

document.getElementById("month").value = new Date().toISOString().slice(0,7);
syncFromSheets();

</script>

</body>
</html>
