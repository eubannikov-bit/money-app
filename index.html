<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money App</title>
</head>
<body>

<script>
let entries = [];
let entrySeq = 0;
const SHEETS_URL = "PASTE_YOUR_URL_HERE";

function setSyncState(){}

function processSheetData(data){
  entries = data.entries || [];
}

function syncFromSheets(retry = true){
  setSyncState('wait','загрузка данных...','');

  const cb='cb_'+Date.now()+'_'+(++entrySeq);
  let done=false;

  function cleanup(script){
    if(done) return;
    done = true;
    try{document.head.removeChild(script);}catch(e){}
    delete window[cb];
  }

  return new Promise((resolve,reject)=>{

    const script=document.createElement('script');

    window[cb]=function(data){
      cleanup(script);
      try{
        processSheetData(data);
        resolve();
      }catch(err){
        reject(err);
      }
    };

    script.onerror=function(){
      cleanup(script);
      fallback();
    };

    setTimeout(()=>{
      cleanup(script);
      fallback();
    },25000);

    function fallback(){
      if(!retry){
        reject();
        return;
      }

      fetch(SHEETS_URL + '?t=' + Date.now())
        .then(r=>r.json())
        .then(data=>{
          processSheetData(data);
          resolve();
        })
        .catch(()=>{
          reject();
        });
    }

    script.src = SHEETS_URL + '?callback=' + cb + '&t=' + Date.now();
    document.head.appendChild(script);
  });
}

syncFromSheets();
</script>

</body>
</html>
